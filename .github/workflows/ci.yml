name: CI — Site

on:
  push:
    paths:
      - 'src/**'
      - 'test/**'
      - 'tests/**'
      - 'scripts/**'
      - 'package.json'
      - 'bun.lock'
      - 'Containerfile'
      - 'next.config.*'
      - 'playwright.config.*'
      - 'vitest.config.*'
      - '.github/workflows/**'
      - 'content/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Fresh push to the same ref cancels the prior in-flight run. Branch tip
# always wins. Keeps queue depth bounded when iterating fast.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Gate runs (PR + push to main) run the full suite.
      # Non-gate runs (feature-branch push) run lint + delta unit only.
      IS_GATE: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          # `vitest --changed origin/main` needs the merge base to compute
          # the diff. Full history is cheap for this repo.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Configure npm for the @olympusoss scope
        # @olympusoss/canvas is published to npmjs.org by canvas's
        # release workflow; auth with NPM_TOKEN (org-scoped read-only).
        run: |
          echo "@olympusoss:registry=https://registry.npmjs.org" >> .npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc
      - name: Replace local workspace refs with latest published versions
        # Dev uses link:@olympusoss/canvas for fast local iteration.
        # CI must install from the registry so builds are reproducible.
        run: |
          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            let changed = false;
            for (const depGroup of ['dependencies', 'devDependencies', 'peerDependencies']) {
              const deps = pkg[depGroup];
              if (!deps) continue;
              for (const [name, version] of Object.entries(deps)) {
                if (typeof version === 'string' && (version.startsWith('file:') || version.startsWith('link:'))) {
                  const latest = execSync('npm view ' + name + ' version', { encoding: 'utf8' }).trim();
                  console.log(depGroup + ': ' + name + ' ' + version + ' -> ^' + latest);
                  deps[name] = '^' + latest;
                  changed = true;
                }
              }
            }
            if (changed) {
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
              console.log('Replaced local refs with registry versions.');
            } else {
              console.log('No local refs found.');
            }
          "
      - run: bun install
      - run: bun run lint

      - name: Run unit tests (delta — feature branch)
        if: env.IS_GATE != 'true'
        run: bunx vitest run --changed origin/main

      - name: Run unit tests (full — PR or main)
        if: env.IS_GATE == 'true'
        run: bun run test

      - name: Snapshot coverage gate (100%)
        if: env.IS_GATE == 'true'
        run: bun run snapshot-coverage

      - name: Run unit tests with coverage (100/100/100/90 gate)
        if: env.IS_GATE == 'true'
        run: bun run test:coverage

      # `next build` generates the fumadocs `.source/` runtime AND runs the
      # full TypeScript check against the produced source — same engine the
      # standalone `bun run typecheck` script would invoke. Skipping the
      # separate typecheck step keeps `.source/` generation in the right
      # order: a bare `tsc --noEmit` runs before MDX scaffolding exists and
      # fails to resolve `./.source/server`.
      - name: Build
        if: env.IS_GATE == 'true'
        run: bun run build

      - name: Install Playwright browsers
        if: env.IS_GATE == 'true'
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        if: env.IS_GATE == 'true'
        run: bun run test:e2e
        env:
          CI: true
