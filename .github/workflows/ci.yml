name: CI — Site

on:
  push:
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'Containerfile'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Configure npm for GitHub Packages
        run: |
          echo "@olympusoss:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - name: Resolve canvas dependency for CI
        run: |
          sed -i 's|"@olympusoss/canvas": "file:../canvas"|"@olympusoss/canvas": "^1.0.8"|' package.json
      - run: bun install
      - run: bun run typecheck
      - run: bun run build
