name: CD — Site

on:
  workflow_run:
    workflows: ["CI — Site"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [canvas-updated]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/olympusoss/site

jobs:
  version:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from package.json
        id: bump
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "new_version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: v${VERSION}"

      - name: Create tag (if not exists)
        run: |
          git tag ${{ steps.bump.outputs.new_version }} 2>/dev/null || true
          git push origin ${{ steps.bump.outputs.new_version }} 2>/dev/null || true

  build:
    needs: version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Resolve canvas dependency for build
        run: |
          sed -i 's|"@olympusoss/canvas": "file:../canvas"|"@olympusoss/canvas": "^0.3.0"|' package.json

      - name: Create .npmrc for build
        run: |
          echo "@olympusoss:registry=https://npm.pkg.github.com" > /tmp/.build-npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> /tmp/.build-npmrc

      - name: Build image
        id: build
        run: |
          podman build \
            --secret id=npmrc,src=/tmp/.build-npmrc \
            --build-arg CACHE_BUST=${{ github.run_id }} \
            --layers=true \
            -f ./Containerfile \
            -t ${{ env.IMAGE_NAME }}:build-${{ github.sha }}-${{ strategy.job-index }} \
            .

      - name: Push image by digest
        id: push
        run: |
          DIGEST=$(podman push --digestfile /tmp/digest ${{ env.IMAGE_NAME }}:build-${{ github.sha }}-${{ strategy.job-index }} && cat /tmp/digest)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed digest: ${DIGEST}"

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE_NAME }}:${{ needs.version.outputs.new_version }}"
          TAGS="${TAGS} ${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS} ${{ env.IMAGE_NAME }}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          podman manifest create ${{ env.IMAGE_NAME }}:manifest
          for digest in *; do
            podman manifest add ${{ env.IMAGE_NAME }}:manifest ${{ env.IMAGE_NAME }}@sha256:${digest}
          done
          for tag in ${{ steps.tags.outputs.tags }}; do
            podman manifest push ${{ env.IMAGE_NAME }}:manifest ${tag}
          done

      - name: Inspect image
        run: podman manifest inspect ${{ env.IMAGE_NAME }}:latest || true

  deploy:
    needs: [version, merge]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-site-production
      cancel-in-progress: false

    env:
      SSH_OPTS: -i ~/.ssh/deploy_key -p ${{ vars.DEPLOY_SSH_PORT || 22 }} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=30
      SSH_TARGET: ${{ vars.DEPLOY_USER || 'root' }}@${{ vars.DEPLOY_SERVER_IP }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/olympusoss/prod' }}
      SERVICES: site

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -p ${{ vars.DEPLOY_SSH_PORT || 22 }} ${{ vars.DEPLOY_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Login to GHCR on server
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "echo '${{ secrets.GHCR_PAT }}' | podman login ghcr.io -u ${{ vars.GHCR_USERNAME }} --password-stdin"

      - name: Pull updated images
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && podman compose -f compose.prod.yml pull ${{ env.SERVICES }}"

      - name: Restart services
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             for svc in ${{ env.SERVICES }}; do \
               podman stop \"prod_\${svc}_1\" 2>/dev/null || true; \
               podman rm \"prod_\${svc}_1\" 2>/dev/null || true; \
             done && \
             podman compose -f compose.prod.yml up -d ${{ env.SERVICES }}"

      - name: Reload Caddy
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "podman exec prod_caddy_1 caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile 2>/dev/null || \
             podman restart prod_caddy_1 2>/dev/null || true"

      - name: Wait for healthy
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} 'echo "Waiting for services to stabilize..." && \
            sleep 10 && \
            for i in $(seq 1 20); do \
              HEALTH=$(podman ps --filter "name=site" --format "{{.Names}} {{.Status}}"); \
              echo "[${i}/20] ${HEALTH}"; \
              if echo "${HEALTH}" | grep -q "(healthy)"; then \
                echo "All services healthy!"; \
                exit 0; \
              fi; \
              sleep 5; \
            done; \
            echo "WARNING: Not all services healthy after 100s"; \
            podman ps --filter "name=site" --format "table {{.Names}}\t{{.Status}}"; \
            exit 1'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
