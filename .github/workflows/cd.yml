name: CD — Site

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platforms:
        description: Build platforms (comma-separated). Override to scope an emergency run, e.g. linux/amd64 only when arm64 emulation misbehaves.
        type: string
        default: linux/amd64,linux/arm64
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/olympusoss/site

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_version: ${{ steps.extract.outputs.tag_version }}
    steps:
      - name: Extract tag version
        id: extract
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag version: ${TAG_VERSION}"

      - name: Validate tag-commit ancestry (athena#121 AC1)
        # Uses GitHub API instead of git merge-base to avoid shallow clone issues.
        # Status must be "behind" (tag is ancestor of main) or "identical" (tag IS main HEAD).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/compare/main...${{ github.ref_name }} \
            --jq '.status')
          echo "Ancestry status: ${STATUS}"
          if [[ "${STATUS}" != "identical" && "${STATUS}" != "behind" ]]; then
            echo "::error::Tag ${{ github.ref_name }} is not reachable from main (status: ${STATUS}). Aborting deploy."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Validate tag-version consistency (athena#121 AC2)
        # Prevents orphan tags where package.json version doesn't match the tag.
        # This is the critical gate — catches tags pushed without version bumps.
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: ${PKG_VERSION}"
          echo "Tag version: ${TAG_VERSION}"
          if [[ "${PKG_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "::error::Version mismatch: package.json=${PKG_VERSION}, tag=${TAG_VERSION}. Aborting deploy."
            exit 1
          fi

  version:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      new_version: v${{ needs.validate.outputs.tag_version }}
    steps:
      - run: echo "Version v${{ needs.validate.outputs.tag_version }} passed validation"

  build:
    # Multi-arch via docker buildx + QEMU emulation on a single amd64 runner.
    # The previous strategy (amd64 native; arm64 native via ubuntu-24.04-arm
    # commented out) was abandoned because `next build` segfaults inside the
    # ubuntu-24.04-arm runner while generating the 920 static pages — almost
    # certainly a native-arm64 SWC / lightningcss / next-swc binary bug
    # interacting with the doc-heavy MDX set. QEMU-translated arm64 binaries
    # run a different code path and dodge that bug class. Pattern mirrors
    # platform/.github/workflows/caddy-build.yml.
    needs: [validate, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .npmrc for build
        # @olympusoss/canvas is published to npmjs.org by canvas's
        # release workflow; auth with NPM_TOKEN (org-scoped read-only).
        run: |
          echo "@olympusoss:registry=https://registry.npmjs.org" > /tmp/.build-npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> /tmp/.build-npmrc

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        # The previous podman flow needed an explicit 3-attempt retry loop
        # around the push step because GHCR occasionally returns 504 on
        # blob uploads (seen mid-run on 2026-05-12). buildkit handles
        # transient registry errors internally, so the loop is gone here.
        # If 504s come back, the right fix is the standard
        # `nick-fields/retry@v3` wrapper, not re-rolling our own.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.version.outputs.new_version }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            CACHE_BUST=${{ github.run_id }}
            APP_VERSION=${{ needs.validate.outputs.tag_version }}
          secret-files: |
            npmrc=/tmp/.build-npmrc
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.version.outputs.new_version }}
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --generate-notes \
            --latest \
            || echo "Release ${VERSION} already exists"

  deploy:
    needs: [version, release, validate]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-site-production
      cancel-in-progress: false

    env:
      SSH_OPTS: -i ~/.ssh/deploy_key -p ${{ vars.DEPLOY_SSH_PORT || 22 }} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=30
      SSH_TARGET: ${{ vars.DEPLOY_USER || 'root' }}@${{ vars.DEPLOY_SERVER_IP }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/olympusoss/prod' }}
      SERVICES: site

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -p ${{ vars.DEPLOY_SSH_PORT || 22 }} ${{ vars.DEPLOY_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Drop stale GHCR creds on server
        # The server's podman has cached credentials from older deploys
        # (back when CD did `podman login` here with a now-stale GHCR_PAT).
        # Those creds 403 on every Bearer-token request, even against the
        # public `ghcr.io/olympusoss/site` package. `podman logout` clears
        # them so the next pull goes anonymous, which works for the
        # public image.
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "podman logout ghcr.io 2>/dev/null || true"

      - name: Pull updated images
        run: |
          # Run pull with `set -o pipefail` and guard against
          # podman-compose's habit of swallowing inner errors — exit
          # non-zero if any line of output mentions an error.
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && podman compose -f compose.prod.yml pull ${{ env.SERVICES }} 2>&1 | tee /tmp/pull.log && ! grep -q '^Error' /tmp/pull.log"

      - name: Restart services
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "cd ${{ env.DEPLOY_PATH }} && \
             for svc in ${{ env.SERVICES }}; do \
               podman stop \"prod_\${svc}_1\" 2>/dev/null || true; \
               podman rm \"prod_\${svc}_1\" 2>/dev/null || true; \
             done && \
             podman compose -f compose.prod.yml up -d ${{ env.SERVICES }}"

      - name: Reload Caddy
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "podman exec prod_caddy_1 caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile 2>/dev/null || \
             podman restart prod_caddy_1 2>/dev/null || true"

      - name: Wait for healthy
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} 'echo "Waiting for services to stabilize..." && \
            sleep 10 && \
            for i in $(seq 1 20); do \
              HEALTH=$(podman ps --filter "name=site" --format "{{.Names}} {{.Status}}"); \
              echo "[${i}/20] ${HEALTH}"; \
              if echo "${HEALTH}" | grep -q "(healthy)"; then \
                echo "All services healthy!"; \
                exit 0; \
              fi; \
              sleep 5; \
            done; \
            echo "WARNING: Not all services healthy after 100s"; \
            podman ps --filter "name=site" --format "table {{.Names}}\t{{.Status}}"; \
            exit 1'

      - name: Verify deployed version (athena#121 AC3)
        # Post-deploy version assertion: confirms the running application
        # reports the expected version. Prevents silent false-positive
        # deploys. Hits host port 2000 (compose maps `2000:3000`, so the
        # site container's internal 3000 is reachable on the host at 2000
        # — nothing is bound to host 3000 in compose.prod.yml).
        env:
          EXPECTED_VERSION: ${{ needs.validate.outputs.tag_version }}
        run: |
          RESPONSE=$(ssh ${{ env.SSH_OPTS }} ${{ env.SSH_TARGET }} \
            "curl -sf http://localhost:2000/health 2>/dev/null || echo '{}'")
          DEPLOYED_VERSION=$(echo "${RESPONSE}" | jq -r '.version // "unknown"')
          echo "Expected: ${EXPECTED_VERSION}"
          echo "Deployed: ${DEPLOYED_VERSION}"
          if [[ "${DEPLOYED_VERSION}" != "${EXPECTED_VERSION}" ]]; then
            echo "::error::Version mismatch post-deploy: expected=${EXPECTED_VERSION}, deployed=${DEPLOYED_VERSION}"
            exit 1
          fi
          echo "Version verified: ${DEPLOYED_VERSION}"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
