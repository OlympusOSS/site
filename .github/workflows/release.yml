name: Release — Site

# Changesets-powered release for the site. Runs ONLY after CI completes
# successfully on main. On each run:
#   1. If there are pending changesets, consume them locally (version bump +
#      CHANGELOG update), commit directly to main, push the resulting
#      `v<version>` git tag.
#   2. If no pending changesets, this workflow is a no-op.
#
# The existing CD — Site workflow (.github/workflows/cd.yml) listens for
# `v*` tags and handles the container build + deploy from there. This
# workflow does NOT publish to npm — the site is `"private": true`, so
# `changeset publish` just creates the git tag locally and exits without
# hitting any registry.
#
# Avoids the PR-creation path entirely so it does not need the
# "Allow GitHub Actions to create and approve pull requests" repo setting.

on:
  workflow_run:
    workflows: ["CI — Site"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  # `actions: write` lets the workflow's GITHUB_TOKEN call the
  # workflow_dispatch API to fire `CD — Site` on the new tag. Without
  # it the dispatch returns "HTTP 403: Resource not accessible by
  # integration" (default GITHUB_TOKEN permissions don't include
  # cross-workflow dispatch).
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # workflow_run fires on every completion (success/failure/cancelled).
    # Gate to success-only so a red CI doesn't bump the version.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # workflow_run runs against the default branch by default; pin to the
          # SHA that triggered CI so we tag the exact code that was tested.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure npm for the @olympusoss scope
        # @olympusoss/canvas is published to npmjs.org by canvas's
        # release workflow; auth with NPM_TOKEN (org-scoped read-only).
        run: |
          echo "@olympusoss:registry=https://registry.npmjs.org" >> .npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Replace local workspace refs with latest published versions
        # Dev uses link:@olympusoss/canvas for fast local iteration.
        # CI must install from the registry so builds are reproducible.
        run: |
          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            let changed = false;
            for (const depGroup of ['dependencies', 'devDependencies', 'peerDependencies']) {
              const deps = pkg[depGroup];
              if (!deps) continue;
              for (const [name, version] of Object.entries(deps)) {
                if (typeof version === 'string' && (version.startsWith('file:') || version.startsWith('link:'))) {
                  const latest = execSync('npm view ' + name + ' version', { encoding: 'utf8' }).trim();
                  console.log(depGroup + ': ' + name + ' ' + version + ' -> ^' + latest);
                  deps[name] = '^' + latest;
                  changed = true;
                }
              }
            }
            if (changed) {
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
              console.log('Replaced local refs with registry versions.');
            } else {
              console.log('No local refs found.');
            }
          "
      - run: bun install

      # CI already ran typecheck/build/E2E on this SHA, so we don't repeat
      # them here — just consume changesets, bump, commit, tag, push.

      - name: Check for pending changesets
        id: has_changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count pending changeset(s)."

      - name: Configure git
        if: steps.has_changesets.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version packages
        if: steps.has_changesets.outputs.count != '0'
        run: |
          bun run version-packages
          # The earlier "Replace local workspace refs" step swapped link:
          # deps to ^<version> for CI install. changeset version preserved
          # that swap. Restore the original link: refs so the committed
          # package.json keeps the dev-time workspace protocols.
          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');
            const orig = JSON.parse(execSync('git show HEAD:package.json', { encoding: 'utf8' }));
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            let n = 0;
            for (const g of ['dependencies', 'devDependencies', 'peerDependencies']) {
              if (!orig[g] || !pkg[g]) continue;
              for (const [name, ver] of Object.entries(orig[g])) {
                if ((ver.startsWith('link:') || ver.startsWith('file:')) && pkg[g][name] && pkg[g][name] !== ver) {
                  console.log(g + ': ' + name + ' ' + pkg[g][name] + ' -> ' + ver);
                  pkg[g][name] = ver;
                  n++;
                }
              }
            }
            if (n) {
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
              console.log('Restored ' + n + ' workspace ref(s).');
            }
          "
          git checkout HEAD -- bun.lock
          git add .
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore: version packages [skip ci]"
            # Rebase onto latest main before pushing. workflow_run checks out
            # `head_sha` which can be stale if other pushes have landed since
            # CI started; without rebase the push is rejected non-fast-forward.
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi

      - name: Tag release
        if: steps.has_changesets.outputs.count != '0'
        id: tag
        run: |
          # `changeset publish` is what creates the `v<version>` git tag for
          # single-package private repos. It does NOT publish to npm because
          # package.json has "private": true — it just tags and exits.
          bun run release
          git push --tags
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tagged v${NEW_VERSION}"

      - name: Dispatch CD on the new tag
        # Tags pushed by GITHUB_TOKEN don't trigger other workflows
        # (GitHub's anti-recursion guard). workflow_dispatch IS exempt, so
        # explicitly fire CD against the tag we just created — CD then
        # checks out the tag, validates package.json matches, builds the
        # container, and deploys to prod via SSH.
        if: steps.has_changesets.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "CD — Site" --ref "${{ steps.tag.outputs.version }}"
          echo "Dispatched CD on ${{ steps.tag.outputs.version }}"
