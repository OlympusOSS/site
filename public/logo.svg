<svg xmlns="http://www.w3.org/2000/svg" viewBox="332 290 736 440" role="img" aria-label="Olympus OSS visor logo">
  <defs>
    <linearGradient id="ring-grad" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1E40AF" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
    <style>
      .ring { fill: url(#ring-grad); }
      .txt  { fill: #FFFFFF; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-weight: 800; }
    </style>
  </defs>

  <!-- Visor ring (stadium / capsule) with cutout -->
  <path class="ring" fill-rule="evenodd" d="
    M 552 300
    H 848
    A 210 210 0 0 1 1058 510
    A 210 210 0 0 1 848 720
    H 552
    A 210 210 0 0 1 342 510
    A 210 210 0 0 1 552 300
    Z

    M 582 386
    H 818
    A 124 124 0 0 1 942 510
    A 124 124 0 0 1 818 634
    H 582
    A 124 124 0 0 1 458 510
    A 124 124 0 0 1 582 386
    Z
  "/>

  <!-- OSS text — sized to fit inside the visor cutout (428×192) -->
  <text class="txt" x="708" y="506" text-anchor="middle" dominant-baseline="central"
        font-size="162" letter-spacing="19">OSS</text>
</svg>